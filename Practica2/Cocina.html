<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - Cocina</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .contenedor { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        form { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        input { margin: 5px; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        button.btn-eliminar { background-color: #f44336; }
        button.btn-editar { background-color: #ff9800; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>COCINA</h1>
    
    <form id="formularioProducto">
        <input type="hidden" id="indexProducto"> <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="number" id="precio" placeholder="Precio ($)" step="0.01" required>
        <input type="number" id="cantidad" placeholder="Cantidad" required>
        <button type="submit" id="btnGuardar">Agregar Producto</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="listaProductos">
            </tbody>
    </table>
</div>

<script src="Logica.js"></script>
</body>
</html>
