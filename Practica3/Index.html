<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-center mb-4">
                COCINA
            </h1>

            <!-- FORMULARIO -->
            <div class="row g-3 mb-4">

                <div class="col-md-3">
                    <input 
                        type="text" 
                        id="nombre" 
                        class="form-control" 
                        placeholder="Nombre del producto"
                    >
                </div>

                <div class="col-md-2">
                    <input 
                        type="number" 
                        id="precio" 
                        class="form-control" 
                        placeholder="Precio"
                    >
                </div>

                <div class="col-md-2">
                    <input 
                        type="number" 
                        id="cantidad" 
                        class="form-control" 
                        placeholder="Cantidad"
                    >
                </div>

                <div class="col-md-3">
                    <select id="categoria" class="form-select">
                        <option value="Bebida">Bebida</option>
                        <option value="Postre">Postre</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button 
                        class="btn btn-primary w-100"
                        onclick="guardarProducto()"
                    >
                        Agregar
                    </button>
                </div>

            </div>

            <!-- BOTONES -->
            <div class="d-flex flex-wrap gap-2 mb-4">

                <button class="btn btn-secondary" onclick="listarProductos()">
                    Todos los productos
                </button>

                <button class="btn btn-success" onclick="buscarBaratos()">
                    Productos Baratos
                </button>

                <button class="btn btn-danger" onclick="buscarCaros()">
                    Productos Caros
                </button>

                <button class="btn btn-info text-white" onclick="buscarBebidas()">
                    Bebidas
                </button>

                <button class="btn btn-warning" onclick="buscarPostres()">
                    Postres
                </button>

            </div>

            <!-- TABLA -->
            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Cantidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaProductos"></tbody>

            </table>

        </div>

    </div>

    <script src="cocina.js"></script>

</body>
</html>
