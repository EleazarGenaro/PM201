<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Cafetería Completo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-color: #f4f6f9;
        }

        .tab-content {
            background: white;
            padding: 20px;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-promo {
            background: #ffc107;
            font-size: 0.75rem;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container my-5">

    <h1 class="text-center mb-4 text-primary fw-bold">
        Sistema General Cafetería
    </h1>

    <ul class="nav nav-tabs">

        <li class="nav-item">
            <button
                class="nav-link active fw-bold text-success"
                data-bs-toggle="tab"
                data-bs-target="#cliente"
            >
                Cliente
            </button>
        </li>

        <li class="nav-item">
            <button
                class="nav-link fw-bold text-primary"
                data-bs-toggle="tab"
                data-bs-target="#caja"
            >
                Caja
            </button>
        </li>

        <li class="nav-item">
            <button
                class="nav-link fw-bold text-danger"
                data-bs-toggle="tab"
                data-bs-target="#cocina"
            >
                Cocina
            </button>
        </li>

    </ul>

    <div class="tab-content">

        <!-- CLIENTE -->
        <div class="tab-pane fade show active" id="cliente">

            <div class="row mt-3">

                <div class="col-md-6">

                    <h5 class="border-bottom pb-2">
                        Menú Digital
                    </h5>

                    <div id="vista-menu-cliente"></div>

                </div>

                <div class="col-md-6">

                    <h5 class="border-bottom pb-2">
                        Mis Pedidos
                    </h5>

                    <div id="vista-pedidos-cliente"></div>

                    <button
                        class="btn btn-danger btn-sm w-100 mt-2"
                        onclick="limpiarTodoPrueba()"
                    >
                        Reiniciar Simulación
                    </button>

                </div>

            </div>

        </div>

        <!-- CAJA -->
        <div class="tab-pane fade" id="caja">

            <div class="mt-3">

                <h5 class="border-bottom pb-2">
                    Pedidos en Caja
                </h5>

                <div id="contenedor-pedidos-caja" class="mb-4"></div>

                <div class="card p-3 bg-light text-end">

                    <p class="mb-1 text-muted">
                        Subtotal:
                        <strong id="caja-subtotal">
                            $0.00
                        </strong>
                    </p>

                    <p class="mb-1 text-muted">
                        IVA (16%):
                        <strong id="caja-iva">
                            $0.00
                        </strong>
                    </p>

                    <h4 class="text-success fw-bold">
                        Total:
                        <span id="caja-total">
                            $0.00
                        </span>
                    </h4>

                </div>

            </div>

        </div>

        <!-- COCINA -->
        <div class="tab-pane fade" id="cocina">

            <div class="card shadow p-4 mt-3">

                <h2 class="text-center mb-4">
                    Administración Cocina
                </h2>

                <!-- FORMULARIO -->
                <div class="row g-3 mb-4">

                    <div class="col-md-3">
                        <input
                            type="text"
                            id="nombre"
                            class="form-control"
                            placeholder="Nombre del producto"
                        >
                    </div>

                    <div class="col-md-2">
                        <input
                            type="number"
                            id="precio"
                            class="form-control"
                            placeholder="Precio"
                        >
                    </div>

                    <div class="col-md-2">
                        <input
                            type="number"
                            id="cantidad"
                            class="form-control"
                            placeholder="Cantidad"
                        >
                    </div>

                    <div class="col-md-3">
                        <select id="categoria" class="form-select">
                            <option value="Bebida">Bebida</option>
                            <option value="Postre">Postre</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button
                            class="btn btn-primary w-100"
                            onclick="guardarProducto()"
                        >
                            Agregar
                        </button>
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="d-flex flex-wrap gap-2 mb-4">

                    <button class="btn btn-secondary" onclick="listarProductos()">
                        Todos
                    </button>

                    <button class="btn btn-success" onclick="buscarBaratos()">
                        Baratos
                    </button>

                    <button class="btn btn-danger" onclick="buscarCaros()">
                        Caros
                    </button>

                    <button class="btn btn-info text-white" onclick="buscarBebidas()">
                        Bebidas
                    </button>

                    <button class="btn btn-warning" onclick="buscarPostres()">
                        Postres
                    </button>

                </div>

                <!-- TABLA -->
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Categoría</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>

                    </thead>

                    <tbody id="tablaProductos"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="cliente.js"></script>
<script src="caja.js"></script>
<script src="cocina.js"></script>

</body>
</html>
